<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI 247 Automation — Logo Options</title>
<style>
  @font-face { font-family: 'DM Sans'; src: url('fonts/DMSans-Regular.woff2') format('woff2'); font-weight: 400; font-display: block; }
  @font-face { font-family: 'DM Sans'; src: url('fonts/DMSans-Medium.woff2') format('woff2'); font-weight: 500; font-display: block; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f2; font-family: 'DM Sans', Arial, sans-serif; padding: 60px 48px; display: flex; flex-direction: column; gap: 56px; }
  .section-label { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: rgba(0,0,0,.3); font-weight: 500; margin-bottom: 20px; }
  .meaning { font-size: 11px; color: rgba(0,0,0,.4); margin-bottom: 20px; margin-top: -14px; font-style: italic; }
  .row { display: flex; gap: 24px; flex-wrap: wrap; }
  .card { padding: 36px 48px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; }
  .card.light { background: #fff; border: 1px solid rgba(0,0,0,.07); }
  .card.dark  { background: #111113; }
  hr { border: none; border-top: 1px solid rgba(0,0,0,.1); }
  svg text { font-family: 'DM Sans', Arial, sans-serif; }
</style>
</head>
<body>

<!-- OPTION A: LIGHTNING BOLT — Power / Speed / Always On 24/7 -->
<div>
  <div class="section-label">Option A — Lightning Bolt</div>
  <div class="meaning">Power · Speed · 24/7 always on · AI-driven energy</div>
  <div class="row">
    <div class="card light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 42" width="230" height="84" fill="none">
        <!-- Lightning bolt: power, speed, 24/7 always-on -->
        <path fill="#000" d="M16 2 L7 20 L13 20 L9 38 L24 18 L18 18 Z"/>
        <!-- AI 247 -->
        <text x="32" y="24" font-family="DM Sans,Arial,sans-serif" font-size="22" font-weight="500" fill="#000" letter-spacing="-0.6">AI 247</text>
        <!-- AUTOMATION — small, right-aligned under "247" -->
        <text x="114" y="36" font-family="DM Sans,Arial,sans-serif" font-size="7.5" font-weight="500" fill="rgba(0,0,0,.38)" letter-spacing=".16em" text-anchor="end">AUTOMATION</text>
      </svg>
    </div>
    <div class="card dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 42" width="230" height="84" fill="none">
        <path fill="#f0f0f2" d="M16 2 L7 20 L13 20 L9 38 L24 18 L18 18 Z"/>
        <text x="32" y="24" font-family="DM Sans,Arial,sans-serif" font-size="22" font-weight="500" fill="#f0f0f2" letter-spacing="-0.6">AI 247</text>
        <text x="114" y="36" font-family="DM Sans,Arial,sans-serif" font-size="7.5" font-weight="500" fill="rgba(255,255,255,.35)" letter-spacing=".16em" text-anchor="end">AUTOMATION</text>
      </svg>
    </div>
  </div>
</div>

<hr/>

<!-- OPTION B: INFINITY LOOP — 24/7 Continuous / Never Stops / Automation Loop -->
<div>
  <div class="section-label">Option B — Infinity Loop</div>
  <div class="meaning">24/7 never stops · Continuous automation · Always running</div>
  <div class="row">
    <div class="card light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 42" width="230" height="84" fill="none">
        <!-- Infinity path: two loops meeting at center -->
        <path stroke="#000" stroke-width="3" stroke-linecap="round" fill="none"
          d="M20 21 C20 14, 28 10, 28 21 C28 32, 12 32, 12 21 C12 10, 20 14, 20 21"/>
        <text x="32" y="24" font-family="DM Sans,Arial,sans-serif" font-size="22" font-weight="500" fill="#000" letter-spacing="-0.6">AI 247</text>
        <text x="114" y="36" font-family="DM Sans,Arial,sans-serif" font-size="7.5" font-weight="500" fill="rgba(0,0,0,.38)" letter-spacing=".16em" text-anchor="end">AUTOMATION</text>
      </svg>
    </div>
    <div class="card dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 42" width="230" height="84" fill="none">
        <path stroke="#f0f0f2" stroke-width="3" stroke-linecap="round" fill="none"
          d="M20 21 C20 14, 28 10, 28 21 C28 32, 12 32, 12 21 C12 10, 20 14, 20 21"/>
        <text x="32" y="24" font-family="DM Sans,Arial,sans-serif" font-size="22" font-weight="500" fill="#f0f0f2" letter-spacing="-0.6">AI 247</text>
        <text x="114" y="36" font-family="DM Sans,Arial,sans-serif" font-size="7.5" font-weight="500" fill="rgba(255,255,255,.35)" letter-spacing=".16em" text-anchor="end">AUTOMATION</text>
      </svg>
    </div>
  </div>
</div>

<hr/>

<!-- OPTION C: CIRCUIT NODE — AI Brain / Hub / Connected Intelligence -->
<div>
  <div class="section-label">Option C — Circuit Node</div>
  <div class="meaning">AI intelligence · Connected systems · Neural hub · Automation core</div>
  <div class="row">
    <div class="card light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 42" width="230" height="84" fill="none">
        <!-- Circuit node: center filled circle + 4 arms = AI hub connecting everything -->
        <circle cx="17" cy="21" r="4.5" fill="#000"/>
        <line x1="17" y1="4"  x2="17" y2="16.5" stroke="#000" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="17" y1="25.5" x2="17" y2="38" stroke="#000" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="1"  y1="21" x2="12.5" y2="21" stroke="#000" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="21.5" y1="21" x2="30" y2="21" stroke="#000" stroke-width="2.8" stroke-linecap="round"/>
        <!-- AI 247 -->
        <text x="38" y="24" font-family="DM Sans,Arial,sans-serif" font-size="22" font-weight="500" fill="#000" letter-spacing="-0.6">AI 247</text>
        <text x="114" y="36" font-family="DM Sans,Arial,sans-serif" font-size="7.5" font-weight="500" fill="rgba(0,0,0,.38)" letter-spacing=".16em" text-anchor="end">AUTOMATION</text>
      </svg>
    </div>
    <div class="card dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 42" width="230" height="84" fill="none">
        <circle cx="17" cy="21" r="4.5" fill="#f0f0f2"/>
        <line x1="17" y1="4"  x2="17" y2="16.5" stroke="#f0f0f2" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="17" y1="25.5" x2="17" y2="38" stroke="#f0f0f2" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="1"  y1="21" x2="12.5" y2="21" stroke="#f0f0f2" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="21.5" y1="21" x2="30" y2="21" stroke="#f0f0f2" stroke-width="2.8" stroke-linecap="round"/>
        <text x="38" y="24" font-family="DM Sans,Arial,sans-serif" font-size="22" font-weight="500" fill="#f0f0f2" letter-spacing="-0.6">AI 247</text>
        <text x="114" y="36" font-family="DM Sans,Arial,sans-serif" font-size="7.5" font-weight="500" fill="rgba(255,255,255,.35)" letter-spacing=".16em" text-anchor="end">AUTOMATION</text>
      </svg>
    </div>
  </div>
</div>

</body>
</html>
