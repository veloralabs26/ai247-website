<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hamad Alismail — AI 247</title>
<meta name="theme-color" content="#0a0a0c">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cairo:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',Arial,sans-serif;background:#070708;color:#f0f0f2;min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;padding:18px}
  .card{width:100%;max-width:420px;background:#101014;border:1px solid hsla(0,0%,100%,.07);border-radius:26px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .hero{background:radial-gradient(ellipse 120% 90% at 50% 0%,#1d1d33 0%,#111113 70%);padding:30px 24px 70px;text-align:center;position:relative}
  .hero .logo{height:26px;opacity:.95}
  .hero .tag{margin-top:14px;font-size:10px;letter-spacing:.34em;color:hsla(0,0%,100%,.45)}
  .avatar{width:118px;height:118px;border-radius:50%;object-fit:cover;object-position:center top;border:4px solid #101014;margin:-59px auto 0;display:block;position:relative;background:#1a1a22;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .id{text-align:center;padding:14px 24px 4px}
  .id .nm{font-size:25px;font-weight:600;letter-spacing:-.5px}
  .id .nm-ar{font-family:'Cairo',sans-serif;font-size:18px;font-weight:600;color:hsla(0,0%,100%,.92);margin-top:3px}
  .id .ti{font-size:13px;color:hsla(0,0%,100%,.55);margin-top:9px;line-height:1.6}
  .id .ti b{font-family:'Cairo',sans-serif;font-weight:500;color:hsla(0,0%,100%,.7)}
  .save{display:flex;align-items:center;justify-content:center;gap:9px;margin:20px 24px 4px;padding:15px;background:#f0f0f2;color:#0a0a0c;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;width:calc(100% - 48px)}
  .save:active{transform:scale(.99)}
  .save svg{width:19px;height:19px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:14px 24px 6px}
  .act{display:flex;align-items:center;gap:11px;padding:14px;background:#16161c;border:1px solid hsla(0,0%,100%,.07);border-radius:13px;color:#f0f0f2;text-decoration:none;font-size:14px;font-weight:500}
  .act:active{background:#1d1d25}
  .act .ic{width:34px;height:34px;border-radius:9px;background:hsla(0,0%,100%,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .act .ic svg{width:18px;height:18px;color:#e7e7ea}
  .act.wa .ic{background:rgba(37,211,102,.14)} .act.wa .ic svg{color:#25d366;width:20px;height:20px}
  .act .lbl small{display:block;font-size:11px;color:hsla(0,0%,100%,.42);font-weight:400;margin-top:1px}
  .foot{text-align:center;padding:16px 0 22px;font-size:12px;color:hsla(0,0%,100%,.35)}
  .foot a{color:hsla(0,0%,100%,.55);text-decoration:none}
</style>
